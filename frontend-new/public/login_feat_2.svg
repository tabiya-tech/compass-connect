<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" aria-hidden="true">
  <!-- document card -->
  <rect x="52" y="30" width="96" height="124" rx="8" fill="#002147"/>
  <!-- card highlight lines (CV rows) -->
  <rect x="66" y="56"  width="68" height="8"  rx="3" fill="#00FF91" opacity="0.9"/>
  <rect x="66" y="74"  width="50" height="6"  rx="3" fill="#E5E7EB" opacity="0.5"/>
  <rect x="66" y="88"  width="56" height="6"  rx="3" fill="#E5E7EB" opacity="0.5"/>
  <rect x="66" y="102" width="44" height="6"  rx="3" fill="#E5E7EB" opacity="0.35"/>
  <rect x="66" y="116" width="52" height="6"  rx="3" fill="#E5E7EB" opacity="0.35"/>

  <!-- avatar circle on card -->
  <circle cx="80" cy="44" r="8" fill="#247066"/>
  <circle cx="80" cy="44" r="3" fill="#00FF91"/>

  <!-- floating accent circles -->
  <circle cx="42"  cy="54"  r="14" fill="none" stroke="#247066" stroke-width="2" opacity="0.35"/>
  <circle cx="42"  cy="54"  r="5"  fill="#247066" opacity="0.5"/>
  <circle cx="162" cy="130" r="18" fill="none" stroke="#00FF91" stroke-width="2" opacity="0.3"/>
  <circle cx="162" cy="130" r="6"  fill="#00FF91" opacity="0.6"/>

  <!-- small dot accent -->
  <circle cx="155" cy="48" r="4" fill="#247066" opacity="0.4"/>
  <circle cx="40"  cy="148" r="5" fill="#00FF91" opacity="0.35"/>

  <!-- ground line -->
  <line x1="44" y1="174" x2="156" y2="174" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>
</svg>
